baseURL = "https://jaimeyanes.github.io/"
languageCode = "es-ES"
title = "Jaime Yanes | Seguridad y Comunicaciones"
theme = "PaperMod"

[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[minify]
  disableXML = true
  minifyOutput = true

# ─────────────────────────────────────────────
#  PARÁMETROS GLOBALES Y ESTILO SENIOR
# ─────────────────────────────────────────────
[params]
  env             = "production"
  author          = "Jaime Yanes"
  description     = "Arquitecto de redes y seguridad con experiencia desplegando infraestructuras críticas en entornos empresariales."
  keywords        = ["Seguridad de Red", "SD-WAN", "Fortinet", "Zero Trust", "SASE", "Post-Quantum", "Ciberseguridad", "Firewall"]
  
  # --- Configuración Visual para que NO sea soso ---
  defaultTheme    = "dark"
  disableThemeToggle = true # Bloqueado en dark para más autoridad
  
  # Paleta de colores técnica (Gris Azulado + Azul Eléctrico)
  assets = { disableHLJS = false }
  style = {
    bg = "#111827"          # Fondo gris oscuro profundo
    fg = "#d1d5db"          # Texto principal suave
    accent = "#3b82f6"      # Azul "Cisco/Fortinet" para enlaces
    card_bg = "#1f2937"     # Fondo de las tarjetas de post
  }

  # Página de inicio: modo texto
  [params.homeInfoParams]
    Title   = "Jaime Yanes"
    Content = """Arquitecto de redes y seguridad con años desplegando \
infraestructuras críticas para entornos empresariales. \
Aquí escribo sobre lo que sé porque lo he operado: \
firewalls, SD-WAN, Zero Trust, SASE y la convergencia entre redes y seguridad."""

  # Iconos sociales
  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://linkedin.com/in/jaimeyg"
  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/jaime-yanes"
  [[params.socialIcons]]
    name = "rss"
    url  = "/index.xml"

  # Comportamiento de los posts
  ShowReadingTime       = true
  ShowShareButtons      = false
  ShowPostNavLinks      = true
  ShowBreadCrumbs       = true
  ShowCodeCopyButtons   = true
  ShowWordCount         = false
  UseHugoToc            = true
  showtoc               = true

  [params.label]
    text = "Jaime Yanes"

# ─────────────────────────────────────────────
#  MENÚ DE NAVEGACIÓN
# ─────────────────────────────────────────────
[[menu.main]]
  identifier = "blog"
  name       = "Blog"
  url        = "/posts/"
  weight     = 10

[[menu.main]]
  identifier = "portfolio"
  name       = "Porfolio"
  url        = "/portfolio/"
  weight     = 20

[[menu.main]]
  identifier = "sobre-mi"
  name       = "Sobre mí"
  url        = "/sobre-mi/"
  weight     = 30

[[menu.main]]
  identifier = "contacto"
  name       = "Conectar"
  url        = "/contacto/"
  weight     = 40

# ─────────────────────────────────────────────
#  CONFIGURACIÓN TÉCNICA (Taxonomías y Markup)
# ─────────────────────────────────────────────
[taxonomies]
  category = "categories"
  tag      = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
